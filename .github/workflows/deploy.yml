name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

  # Allow manual re-deployment from the Actions tab
  workflow_dispatch:

# Grant the GITHUB_TOKEN the permissions needed by the deploy action
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment; cancel in-flight runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the whole repo root (index.html, data.js, styles.css)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
