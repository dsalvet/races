<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Running Gear | My Running Races</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero hero-gear">
    <h1>Running <span>Gear</span></h1>
    <p>Track the gear you own and use for training and races.</p>
    <div class="hero-actions">
      <a class="hero-link" href="index.html">Back to races</a>
      <a class="hero-link" href="gallery.html">Browse photos</a>
    </div>
  </header>

  <main class="gear-page">
    <section id="gear-section">
      <div class="section-header">
        <h2>Gear Inventory</h2>
        <span class="badge badge-past" id="gear-count"></span>
      </div>
      <div class="gear-grid" id="gear-grid">
        <!-- filled by JS -->
      </div>
    </section>
  </main>

  <footer>
    <p>Edit <a href="data.js">data.js</a> to add gear items to this page.</p>
  </footer>

  <script src="data.js"></script>
  <script>
  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function formatText(value) {
    return String(value || '').trim();
  }

  function categoryOrder(category) {
    const normalized = formatText(category).toLowerCase();
    if (normalized === 'shoes') return 0;
    if (normalized === 'running vests') return 1;
    if (normalized === 'running poles') return 2;
    return 99;
  }

  function statusClass(status) {
    const normalized = formatText(status).toLowerCase();
    if (normalized === 'active') return 'gear-status-active';
    if (normalized === 'retired') return 'gear-status-retired';
    return 'gear-status-neutral';
  }

  function statusOrder(status) {
    const normalized = formatText(status).toLowerCase();
    if (normalized === 'active') return 0;
    if (normalized === 'retired') return 1;
    return 2;
  }

  function renderGear() {
    const gearList = Array.isArray(gearData) ? gearData : [];
    const list = [...gearList].sort((a, b) => {
      const categoryA = categoryOrder(a.category) - categoryOrder(b.category);
      if (categoryA !== 0) return categoryA;
      const statusA = statusOrder(a.status) - statusOrder(b.status);
      if (statusA !== 0) return statusA;
      const nameA = formatText(a.name).localeCompare(formatText(b.name));
      if (nameA !== 0) return nameA;
      return formatText(a.model).localeCompare(formatText(b.model));
    });

    document.getElementById('gear-count').textContent = `${list.length} item${list.length !== 1 ? 's' : ''}`;

    if (!list.length) {
      document.getElementById('gear-grid').innerHTML =
        `<div class="empty-state"><strong>No gear listed yet.</strong><p>Add objects to <code>gearData</code> in data.js to build your inventory.</p></div>`;
      return;
    }

    const grouped = list.reduce((acc, item) => {
      const category = formatText(item.category) || 'Gear';
      if (!acc[category]) acc[category] = [];
      acc[category].push(item);
      return acc;
    }, {});

    const categories = Object.keys(grouped).sort((a, b) => {
      const orderDiff = categoryOrder(a) - categoryOrder(b);
      if (orderDiff !== 0) return orderDiff;
      return a.localeCompare(b);
    });

    document.getElementById('gear-grid').innerHTML = categories.map(category => {
      const items = grouped[category];

      return `<section class="gear-category-section">
        <div class="section-header gear-category-header">
          <h3>${esc(category)}</h3>
          <span class="badge badge-past">${items.length} item${items.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="gear-item-list">
          ${items.map(item => {
            const status = formatText(item.status);
            const brand = formatText(item.brand);
            const model = formatText(item.model);
            const notes = formatText(item.notes);
            const url = formatText(item.url);

            return `<article class="gear-card">
              <div class="gear-card-head">
                <div>
                  <h4>${url ? `<a href="${esc(url)}" target="_blank" rel="noopener">${esc(item.name)}</a>` : esc(item.name)}</h4>
                </div>
                ${status ? `<span class="gear-status ${statusClass(status)}">${esc(status)}</span>` : ''}
              </div>
              <dl class="gear-meta">
                ${brand ? `<div><dt>Brand</dt><dd>${esc(brand)}</dd></div>` : ''}
                ${model ? `<div><dt>Model</dt><dd>${esc(model)}</dd></div>` : ''}
                ${item.price ? `<div><dt>Price</dt><dd>${esc(item.price)}</dd></div>` : ''}
                ${item.weight ? `<div><dt>Weight</dt><dd>${esc(item.weight)}</dd></div>` : ''}
                ${item.size ? `<div><dt>Size</dt><dd>${esc(item.size)}</dd></div>` : ''}
                ${item.acquired ? `<div><dt>Acquired</dt><dd>${esc(item.acquired)}</dd></div>` : ''}
                ${item.value ? `<div><dt>Value</dt><dd>${esc(item.value)}</dd></div>` : ''}
              </dl>
              ${notes ? `<p class="gear-notes">${esc(notes)}</p>` : ''}
            </article>`;
          }).join('')}
        </div>
      </section>`;
    }).join('');
  }

  renderGear();
  </script>
</body>
</html>
